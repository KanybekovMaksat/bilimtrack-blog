<body>

<header class="site-header">
  <div class="site-header__inner">
    <a class="brand" href="Blog Home.html" aria-label="Bilimtrack">
      <img src="assets/logo-mark.png" alt="">
      <span class="brand__name">Bilimtrack</span>
    </a>
    <nav class="header-nav">
      <a href="#">Возможности</a>
      <a href="#">Цены</a>
      <a href="Blog Home.html" class="is-active">Блог</a>
    </nav>
    <span class="header-spacer"></span>
    <a class="btn btn--primary btn--sm" href="#demo">Получить демо<i data-ic="chevron-right"></i></a>
  </div>
</header>

<main class="page container" data-screen-label="Category">
  <nav class="crumbs" style="padding-top:36px">
    <a href="Blog Home.html">Блог</a>
    <i data-ic="chevron-right"></i>
    <span id="crumbCat">Категория</span>
  </nav>

  <section class="page-hero" style="padding-top:14px">
    <h1 id="catTitle">Категория</h1>

  <div class="filter-row" id="filterRow"></div>

  <div class="with-sidebar">
    <div class="feed">
      <div class="section-label">
        <h2 id="gridHeading">Статьи</h2>
        <span class="count" id="gridCount"></span>
      </div>
      <div class="card-grid" id="cardGrid"></div>
      <div class="empty-state" id="emptyState" hidden>В этой категории пока нет статей.</div>
      <div class="load-more-wrap" id="loadMoreWrap" hidden>
        <button class="btn btn--outline" id="loadMoreBtn">Загрузить ещё<i data-ic="chevron-down"></i></button>
      </div>
    </div>
    <aside class="sidebar" id="sidebar"></aside>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer__inner">
    <a class="brand" href="Blog Home.html"><img src="assets/logo-mark.png" alt="" style="width:28px;height:28px"><span class="brand__name">Bilimtrack</span></a>
    <nav class="site-footer__links">
      <a href="#">Возможности</a>
      <a href="#">Цены</a>
      <a href="Blog Home.html">Блог</a>
      <a href="#demo">Демо</a>
    </nav>
    <span class="site-footer__legal">Разработано OurEra Soft</span>
  </div>
</footer>

<script src="assets/icons-inline.js"></script>
<script src="assets/blog.js"></script>
<script>
(function () {
  const PAGE_SIZE = 6;
  const params = new URLSearchParams(location.search);
  let cat = params.get("c");
  if (!CAT_DESC[cat]) cat = "cases"; // default / fallback
  let shown = PAGE_SIZE;

  const label = CAT_LABEL[cat];
  document.title = label + " — Блог Bilimtrack";
  document.getElementById("crumbCat").textContent = label;
  document.getElementById("catTitle").textContent = label;
  document.getElementById("catDesc").textContent = CAT_DESC[cat];
  document.getElementById("gridHeading").textContent = "Статьи категории";
  document.getElementById("sidebar").innerHTML = sidebarHTML(cat);

  // Filter chips — links to other categories (active = current)
  const counts = {};
  CATEGORIES.forEach(c => counts[c.key] = c.key === "all" ? ARTICLES.length : ARTICLES.filter(a => a.cat === c.key).length);
  document.getElementById("filterRow").innerHTML = CATEGORIES.map(c => {
    const href = c.key === "all" ? "Blog Home.html" : "Category.html?c=" + c.key;
    return `<a class="chip${c.key === cat ? " is-active" : ""}" href="${href}">${c.label}<span class="chip__count">${counts[c.key]}</span></a>`;
  }).join("");

  const list = ARTICLES.filter(a => a.cat === cat);
  const cardGrid = document.getElementById("cardGrid");
  const gridCount = document.getElementById("gridCount");
  const loadMoreWrap = document.getElementById("loadMoreWrap");
  const emptyState = document.getElementById("emptyState");

  function plural(n) {
    const m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return "статья";
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return "статьи";
    return "статей";
  }

  function render() {
    gridCount.textContent = list.length ? `${list.length} ${plural(list.length)}` : "";
    emptyState.hidden = list.length !== 0;
    cardGrid.innerHTML = list.slice(0, shown).map(cardHTML).join("");
    loadMoreWrap.hidden = list.length <= shown;
  }
  document.getElementById("loadMoreBtn").addEventListener("click", () => { shown += PAGE_SIZE; render(); });
  render();
})();
</script>
